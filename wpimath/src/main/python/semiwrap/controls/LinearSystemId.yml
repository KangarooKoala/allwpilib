defaults:
  subpackage: plant

classes:
  wpi::math::LinearSystemId:
    typealias:
    - kv_meters = wpi::units::unit<wpi::units::compound_conversion_factor<wpi::units::volts_, wpi::units::inverse<wpi::units::meters_per_second_>>>
    - kv_radians = wpi::units::unit<wpi::units::compound_conversion_factor<wpi::units::volts_, wpi::units::inverse<wpi::units::radians_per_second_>>>
    - ka_meters = wpi::units::unit<wpi::units::compound_conversion_factor<wpi::units::volts_, wpi::units::inverse<wpi::units::meters_per_second_squared_>>>
    - ka_radians = wpi::units::unit<wpi::units::compound_conversion_factor<wpi::units::volts_, wpi::units::inverse<wpi::units::radians_per_second_squared_>>>
    methods:
      ElevatorSystem:
      SingleJointedArmSystem:
      IdentifyVelocitySystem:
        rename: identifyVelocitySystemMeters
        cpp_code: |
          [](kv_meters kV, ka_meters kA) {
            return wpi::math::LinearSystemId::IdentifyVelocitySystem<wpi::units::meters_>(kV, kA);
          }
      IdentifyPositionSystem:
        rename: identifyPositionSystemMeters
        cpp_code: |
          [](kv_meters kV, ka_meters kA) {
            return wpi::math::LinearSystemId::IdentifyPositionSystem<wpi::units::meters_>(kV, kA);
          }
      IdentifyDrivetrainSystem:
        overloads:
          decltype(1_V/1_mps), decltype(1_V/1_mps2), decltype(1_V/1_mps), decltype(1_V/1_mps2):
            cpp_code: |
              [](kv_meters kVlinear, ka_meters kAlinear, kv_meters kVangular, ka_meters kAangular) {
                return wpi::math::LinearSystemId::IdentifyDrivetrainSystem(kVlinear, kAlinear, kVangular, kAangular);
              }
          decltype(1_V/1_mps), decltype(1_V/1_mps2), decltype(1_V/1_rad_per_s), decltype(1_V/1_rad_per_s_sq), wpi::units::meters<>:
            cpp_code: |
              [](kv_meters kVlinear, ka_meters kAlinear, kv_radians kVangular, ka_radians kAangular, wpi::units::meters<> trackWidth) {
                return wpi::math::LinearSystemId::IdentifyDrivetrainSystem(kVlinear, kAlinear, kVangular, kAangular, trackWidth);
              }
      FlywheelSystem:
      DCMotorSystem:
        overloads:
          DCMotor, wpi::units::kilogram_square_meters<>, double:
          decltype(1_V/Velocity_t<Distance> (1)), decltype(1_V/Acceleration_t<Distance> (1)):
            cpp_code: |
              [](kv_meters kv, ka_meters ka) {
                return wpi::math::LinearSystemId::DCMotorSystem<wpi::units::meters_>(kv, ka);
              }
      DrivetrainVelocitySystem:

    inline_code: |
      .def_static("DCMotorSystemRadians", [](kv_radians kV, ka_radians kA) {
          return wpi::math::LinearSystemId::DCMotorSystem<wpi::units::radians_>(kV, kA);
        }, py::arg("kV"), py::arg("kA"), release_gil()
      )

      .def_static("identifyVelocitySystemRadians", [](kv_radians kV, ka_radians kA) {
          return wpi::math::LinearSystemId::IdentifyVelocitySystem<wpi::units::radians_>(kV, kA);
        }, py::arg("kV"), py::arg("kA"), release_gil()
      )
      .def_static("identifyPositionSystemRadians", [](kv_radians kV, ka_radians kA) {
          return wpi::math::LinearSystemId::IdentifyPositionSystem<wpi::units::radians_>(kV, kA);
        }, py::arg("kV"), py::arg("kA"), release_gil()
      )
